# Golden Principles - Harness Engineering
# Subjective but mechanically enforceable rules

principles:
  - id: prefer-shared-skills
    description: "优先使用共享技能而非内联逻辑"
    enforcement: "suggest"

  - id: mechanical-enforcement-first
    description: "优先使用机械约束而非人工审查"
    enforcement: "mandatory"

  - id: progressive-disclosure
    description: "上下文渐进式披露，避免信息过载"
    enforcement: "mandatory"
    metric: "CLAUDE.md < 150 lines"

  - id: depth-over-breadth
    description: "深度优先：完成一个用户故事再开始下一个"
    enforcement: "suggest"

  - id: verify-before-claim
    description: "声称完成前必须有新鲜验证证据"
    enforcement: "mandatory"

  - id: root-cause-first
    description: "修复前先调查根本原因"
    enforcement: "mandatory"
