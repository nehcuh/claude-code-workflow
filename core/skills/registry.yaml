schema_version: 1
status: phase-6-buildable

_templates:
  superpowers_base: &superpowers_base
    namespace: superpowers
    entrypoint: external
    priority: P2
    supported_targets:
      claude-code: external-skill
      opencode: external-skill
    safety_level: external_reviewed
    conditional: superpowers_installed

  gstack_base: &gstack_base
    namespace: gstack
    entrypoint: external
    priority: P2
    supported_targets:
      claude-code: external-skill
      opencode: external-skill
    safety_level: external_reviewed
    conditional: gstack_installed

namespaces:
  builtin:
    owner: repository
    default_trust: reviewed
    purpose: Core workflow skills maintained in this repo.

  superpowers:
    owner: external_skill_pack
    default_trust: review_required
    purpose: Third-party skill packs such as Superpowers that extend the built-in workflow.

  gstack:
    owner: external_skill_pack
    default_trust: review_required
    purpose: Virtual engineering team — role-based skills for product thinking, code review, browser QA, and release automation.

  project:
    owner: project_maintainer
    default_trust: local_review
    purpose: Project-specific skills layered on top of builtin or external packs.

merge_policy:
  precedence:
    - builtin
    - superpowers
    - gstack
    - project
  name_collision: require_namespace_or_explicit_alias
  default_external_trigger_mode: suggest
  mandatory_external_security_review: true

external_pack_template:
  namespace_examples:
    - superpowers/tdd
    - superpowers/brainstorm
    - gstack/office-hours
    - gstack/review
    - project/domain-audit
  onboarding_rules:
    - Register metadata here before enabling triggers.
    - Start new external skills in suggest or manual mode.
    - Run the skill security audit before first use.

skills:
  - id: systematic-debugging
    namespace: builtin
    entrypoint: skills/systematic-debugging/SKILL.md
    intent: Find root cause before attempting fixes.
    trigger_mode: mandatory
    priority: P0
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Read
      - Grep
      - Bash
    safety_level: trusted_builtin

  - id: verification-before-completion
    namespace: builtin
    entrypoint: skills/verification-before-completion/SKILL.md
    intent: Require fresh verification evidence before claiming completion.
    trigger_mode: mandatory
    priority: P0
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Read
      - Bash
    safety_level: trusted_builtin

  - id: session-end
    namespace: builtin
    entrypoint: skills/session-end/SKILL.md
    intent: Capture handoff, memory, and wrap-up state before ending a session.
    trigger_mode: mandatory
    priority: P0
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Read
      - Edit
      - Bash
    safety_level: trusted_builtin

  - id: planning-with-files
    namespace: builtin
    entrypoint: skills/planning-with-files/SKILL.md
    intent: Use persistent files as working memory for complex multi-step tasks.
    trigger_mode: suggest
    priority: P1
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Read
      - Write
      - Edit
      - Grep
      - Bash
    safety_level: trusted_builtin

  - id: experience-evolution
    namespace: builtin
    entrypoint: skills/experience-evolution/SKILL.md
    intent: Capture reusable lessons and patterns from repeated work.
    trigger_mode: suggest
    priority: P1
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Read
      - Bash
    safety_level: trusted_builtin

  - id: instinct-learning
    namespace: builtin
    entrypoint: skills/instinct-learning/SKILL.md
    intent: Automatic pattern extraction from sessions with confidence scoring.
    trigger_mode: suggest
    priority: P1
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Read
      - Write
      - Bash
    safety_level: trusted_builtin

  # External Superpowers skill pack (conditional on installation)
  - id: superpowers/tdd
    <<: *superpowers_base
    intent: Test-driven development workflow with red-green-refactor cycle.
    trigger_mode: suggest

  - id: superpowers/brainstorm
    <<: *superpowers_base
    intent: Structured brainstorming and ideation sessions.
    trigger_mode: manual

  - id: superpowers/refactor
    <<: *superpowers_base
    intent: Systematic code refactoring with safety checks.
    trigger_mode: suggest

  - id: superpowers/debug
    <<: *superpowers_base
    intent: Advanced debugging workflows beyond systematic-debugging.
    trigger_mode: suggest

  - id: superpowers/architect
    <<: *superpowers_base
    intent: System architecture design and documentation.
    trigger_mode: manual

  - id: superpowers/review
    <<: *superpowers_base
    intent: Code review with comprehensive quality checks.
    trigger_mode: suggest

  - id: superpowers/optimize
    <<: *superpowers_base
    intent: Performance optimization and profiling guidance.
    trigger_mode: manual

  # External gstack skill pack (conditional on installation)
  # Sprint pipeline: Think → Plan → Build → Review → Test → Ship → Reflect
  - id: gstack/office-hours
    <<: *gstack_base
    intent: Product brainstorming with forcing questions — reframes problems before code is written.
    trigger_mode: suggest

  - id: gstack/plan-ceo-review
    <<: *gstack_base
    intent: CEO/founder perspective review — find the 10-star product hiding in the request.
    trigger_mode: suggest

  - id: gstack/plan-eng-review
    <<: *gstack_base
    intent: Engineering architecture review with diagrams, edge cases, and test plans.
    trigger_mode: suggest

  - id: gstack/plan-design-review
    <<: *gstack_base
    intent: Design review with 0-10 ratings per dimension and AI slop detection.
    trigger_mode: manual

  - id: gstack/design-consultation
    <<: *gstack_base
    intent: Build a complete design system — research landscape, propose creative risks, generate mockups.
    trigger_mode: manual

  - id: gstack/review
    <<: *gstack_base
    intent: Pre-landing PR review — SQL safety, LLM trust boundaries, structural issues, auto-fixes.
    trigger_mode: suggest

  - id: gstack/design-review
    <<: *gstack_base
    intent: Visual design audit with fixes — audits implemented design and applies changes.
    trigger_mode: manual

  - id: gstack/codex
    <<: *gstack_base
    intent: Cross-model second opinion via OpenAI Codex CLI — independent review from a different AI.
    trigger_mode: manual

  - id: gstack/investigate
    <<: *gstack_base
    intent: Systematic root-cause debugging with auto-freeze scope boundary.
    trigger_mode: suggest

  - id: gstack/qa
    <<: *gstack_base
    intent: Browser QA — test app in real Chromium, find bugs, fix with atomic commits, generate regression tests.
    trigger_mode: suggest

  - id: gstack/qa-only
    <<: *gstack_base
    intent: QA reporting without code changes — pure bug report from browser testing.
    trigger_mode: manual

  - id: gstack/browse
    <<: *gstack_base
    intent: Headless Chromium browser — navigate, click, screenshot, assert element states.
    trigger_mode: manual

  - id: gstack/setup-browser-cookies
    <<: *gstack_base
    intent: Import cookies from real browser (Chrome, Arc, Brave, Edge) into headless session.
    trigger_mode: manual

  - id: gstack/ship
    <<: *gstack_base
    intent: Release workflow — sync main, run tests, audit coverage, push, open PR.
    trigger_mode: suggest

  - id: gstack/document-release
    <<: *gstack_base
    intent: Auto-update all project docs to match what was just shipped.
    trigger_mode: suggest

  - id: gstack/retro
    <<: *gstack_base
    intent: Team-aware weekly retrospective with per-person breakdowns and shipping streaks.
    trigger_mode: manual

  - id: gstack/careful
    <<: *gstack_base
    intent: Safety guardrails — warns before destructive commands.
    trigger_mode: suggest

  - id: gstack/freeze
    <<: *gstack_base
    intent: Edit scope lock — restrict file edits to one directory during debugging.
    trigger_mode: manual

  - id: gstack/guard
    <<: *gstack_base
    intent: Maximum safety — careful + freeze combined.
    trigger_mode: manual

  - id: gstack/unfreeze
    <<: *gstack_base
    intent: Remove edit scope lock set by /freeze.
    trigger_mode: manual

  - id: riper-workflow
    namespace: builtin
    entrypoint: skills/riper-workflow/SKILL.md
    intent: Structured 5-phase development workflow (Research, Innovate, Plan, Execute, Review).
    trigger_mode: suggest
    priority: P1
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Read
      - Grep
      - Bash
    safety_level: trusted_builtin

  - id: using-git-worktrees
    namespace: builtin
    entrypoint: skills/using-git-worktrees/SKILL.md
    intent: Branch isolation using git worktrees for parallel task execution.
    trigger_mode: suggest
    priority: P1
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Bash
    safety_level: trusted_builtin

  - id: skill-craft
    namespace: builtin
    entrypoint: skills/skill-craft/SKILL.md
    intent: Automatically detect recurring patterns and generate reusable skills.
    trigger_mode: suggest
    priority: P2
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Read
      - Write
      - Bash
    safety_level: trusted_builtin
