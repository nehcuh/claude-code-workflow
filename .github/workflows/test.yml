name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: macos-latest

    strategy:
      matrix:
        ruby-version: ['2.6', '2.7', '3.0']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - name: Install SimpleCov
      run: gem install simplecov

    - name: Run tests with coverage
      run: |
        COVERAGE=true rake test

    - name: Check coverage thresholds
      run: |
        ruby -ryaml -rjson -e "
          if File.exist?('coverage/.last_run.json')
            result = JSON.parse(File.read('coverage/.last_run.json'))
            line = result.dig('result', 'line') || 0
            branch = result.dig('result', 'branch') || 0

            puts \"Line Coverage: #{line}%\"
            puts \"Branch Coverage: #{branch}%\"

            if line < 50
              puts '::error::Line coverage below 50% threshold'
              exit 1
            end

            if branch < 50
              puts '::warning::Branch coverage below 50% threshold'
            end
          else
            puts '::error::Coverage report not found'
            exit 1
          end
        "

    - name: Upload coverage report
      if: matrix.ruby-version == '2.6'
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage/

    - name: Validate YAML files
      run: rake validate

  rubocop:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '2.6'
        bundler-cache: true

    - name: Run RuboCop
      run: bundle exec rubocop
      continue-on-error: true
